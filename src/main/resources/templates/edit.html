<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Expense</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; background: #f5f5f5; }
        h2 { color: #333; }
        .card { background: white; padding: 28px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        label { display: block; margin-bottom: 4px; font-size: 14px; color: #555; }
        input, select { width: 100%; padding: 8px 10px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        .btn-row { display: flex; gap: 10px; }
        button { padding: 9px 22px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        a { padding: 9px 22px; background: #eee; color: #333; text-decoration: none; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

<h2>Edit Expense</h2>

<div class="card">
    <form th:action="@{/update/{id}(id=${expense.id})}" th:object="${expense}" method="post">

        <label>Category</label>
        <input type="text" th:field="*{category}" required/>

        <label>Amount (₹)</label>
        <input type="number" th:field="*{amount}" step="0.01" required/>

        <label>Date</label>
        <input type="date" th:field="*{date}" required/>

        <label>Description</label>
        <input type="text" th:field="*{description}"/>

        <div class="btn-row">
            <button type="submit">Update</button>
            <a th:href="@{/}">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
